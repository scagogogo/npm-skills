version: 2

before:
  hooks:
    - go mod tidy
    - go generate ./...

builds:
  - id: npm-skills
    main: ./cmd/npm-skills
    binary: npm-skills
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
      - freebsd
      - openbsd
      - netbsd
      - illumos
      - solaris
    goarch:
      - "386"
      - amd64
      - arm
      - arm64
      - loong64
      - mips
      - mips64
      - mips64le
      - mipsle
      - ppc64
      - ppc64le
      - riscv64
      - s390x
    ignore:
      - goos: darwin
        goarch: "386"
      - goos: windows
        goarch: arm
      - goos: windows
        goarch: arm64
      - goos: freebsd
        goarch: loong64
      - goos: freebsd
        goarch: mips64
      - goos: freebsd
        goarch: mips64le
      - goos: freebsd
        goarch: riscv64
      - goos: openbsd
        goarch: loong64
      - goos: openbsd
        goarch: mips64
      - goos: openbsd
        goarch: mips64le
      - goos: openbsd
        goarch: riscv64
      - goos: openbsd
        goarch: s390x
      - goos: netbsd
        goarch: loong64
      - goos: netbsd
        goarch: mips64
      - goos: netbsd
        goarch: mips64le
      - goos: netbsd
        goarch: riscv64
      - goos: netbsd
        goarch: s390x
      - goos: illumos
        goarch: "386"
      - goos: illumos
        goarch: arm
      - goos: illumos
        goarch: arm64
      - goos: solaris
        goarch: "386"
      - goos: solaris
        goarch: arm
      - goos: solaris
        goarch: arm64
      - goos: solaris
        goarch: s390x
    flags:
      - -trimpath
    ldflags:
      - -s -w -X main.version={{.Version}} -X main.commit={{.Commit}} -X main.date={{.Date}} -X main.builtBy=goreleaser

  - id: npm-mcp-server
    main: ./cmd/mcp-server
    binary: npm-mcp-server
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
      - freebsd
      - openbsd
      - netbsd
    goarch:
      - "386"
      - amd64
      - arm
      - arm64
      - loong64
      - mips
      - mips64
      - mips64le
      - mipsle
      - ppc64
      - ppc64le
      - riscv64
      - s390x
    ignore:
      - goos: darwin
        goarch: "386"
      - goos: windows
        goarch: arm
      - goos: windows
        goarch: arm64
      - goos: freebsd
        goarch: loong64
      - goos: freebsd
        goarch: mips64
      - goos: freebsd
        goarch: mips64le
      - goos: freebsd
        goarch: riscv64
      - goos: openbsd
        goarch: loong64
      - goos: openbsd
        goarch: mips64
      - goos: openbsd
        goarch: mips64le
      - goos: openbsd
        goarch: riscv64
      - goos: openbsd
        goarch: s390x
      - goos: netbsd
        goarch: loong64
      - goos: netbsd
        goarch: mips64
      - goos: netbsd
        goarch: mips64le
      - goos: netbsd
        goarch: riscv64
      - goos: netbsd
        goarch: s390x
    flags:
      - -trimpath
    ldflags:
      - -s -w -X main.version={{.Version}} -X main.commit={{.Commit}} -X main.date={{.Date}} -X main.builtBy=goreleaser

archives:
  - id: npm-skills-archive
    builds:
      - npm-skills
      - npm-mcp-server
    name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else if eq .Arch "arm64" }}aarch64
      {{- else }}{{ .Arch }}{{ end }}
    format_overrides:
      - goos: windows
        format: zip
    files:
      - README.md
      - LICENSE*

checksum:
  name_template: "checksums.txt"

snapshot:
  version_template: "{{ .Tag }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "^ci:"
      - "merge conflict"
      - Merge pull request
      - Merge remote-tracking branch
      - Revert

release:
  github:
    owner: scagogogo
    name: npm-skills
  draft: false
  prerelease: auto
  mode: replace

